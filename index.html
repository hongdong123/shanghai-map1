<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상해 지도</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; text-align: center; }
        .header h1 { font-size: 20px; margin: 0; }
        .header p { font-size: 12px; margin: 5px 0 0 0; }
        .container { display: flex; flex: 1; }
        #map { flex: 1; background: #e8f4f8; }
        .sidebar { width: 100%; background: #f9f9f9; border-top: 3px solid #667eea; overflow-y: auto; max-height: 40%; }
        .sidebar-section { padding: 15px; border-bottom: 1px solid #ddd; }
        .sidebar-section h3 { font-size: 12px; color: #667eea; margin: 0 0 10px 0; }
        .location-item { padding: 10px; background: white; margin-bottom: 8px; border-left: 3px solid #667eea; cursor: pointer; border-radius: 4px; }
        .location-item strong { display: block; color: #333; margin-bottom: 3px; }
        .location-item span { color: #999; font-size: 11px; }
        .location-item.hotel { border-left-color: #e74c3c; }
        .location-item.golf { border-left-color: #27ae60; }
        .location-item.airport { border-left-color: #3498db; }
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            .sidebar { width: 300px; border-left: 3px solid #667eea; border-top: none; max-height: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ 상해 지도</h1>
        <p>호텔 • 골프장 • 공항</p>
    </div>
    
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>🏨 호텔</h3>
                <div id="hotelList"></div>
            </div>
            <div class="sidebar-section">
                <h3>⛳ 골프장</h3>
                <div id="golfList"></div>
            </div>
            <div class="sidebar-section">
                <h3>✈️ 공항</h3>
                <div id="airportList"></div>
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([31.230, 121.470], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        
        const locations = [
            {id: 1, category: 'hotel', name: '벨라지오 바이 MGM', lat: 31.24706, lng: 121.48241, icon: '🏨', address: '188 Beisuzhou Road'},
            {id: 2, category: 'hotel', name: '오쿠라 가든 호텔', lat: 31.2226, lng: 121.4612, icon: '🏨', address: '58 South Maoming Road'},
            {id: 3, category: 'golf', name: 'PGA 안잉', lat: 31.44744757585559, lng: 121.84606829818833, icon: '⛳', address: '陈家镇揽海路55弄'},
            {id: 4, category: 'golf', name: '미란호 골프장', lat: 31.403466, lng: 121.367705, icon: '⛳', address: '6655 Hutai Road'},
            {id: 5, category: 'airport', name: '푸동 공항', lat: 31.143333, lng: 121.805275, icon: '✈️', address: 'Pudong International'},
            {id: 6, category: 'airport', name: '홍차오 공항', lat: 31.19806, lng: 121.33639, icon: '✈️', address: 'Hongqiao International'}
        ];
        
        const colors = {hotel: '#e74c3c', golf: '#27ae60', airport: '#3498db'};
        const markers = {};
        const markerGroup = L.featureGroup();
        
        locations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng], {
                icon: L.divIcon({
                    html: `<div style="background: ${colors[loc.category]}; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">${loc.icon}</div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20],
                    popupAnchor: [0, -20]
                })
            })
            .bindPopup(`<strong>${loc.name}</strong><br/>${loc.address}`)
            .addTo(map);
            
            markers[loc.id] = marker;
            markerGroup.addLayer(marker);
        });
        
        ['hotel', 'golf', 'airport'].forEach(category => {
            const listId = category === 'hotel' ? 'hotelList' : category === 'golf' ? 'golfList' : 'airportList';
            const container = document.getElementById(listId);
            
            locations.filter(loc => loc.category === category).forEach(loc => {
                const item = document.createElement('div');
                item.className = `location-item ${category}`;
                item.innerHTML = `<strong>${loc.icon} ${loc.name}</strong><span>${loc.address}</span>`;
                item.onclick = () => {
                    map.setView([loc.lat, loc.lng], 14);
                    setTimeout(() => markers[loc.id].openPopup(), 300);
                };
                container.appendChild(item);
            });
        });
        
        setTimeout(() => {
            map.fitBounds(markerGroup.getBounds().pad(0.1));
        }, 500);
        
        window.addEventListener('resize', () => {
            setTimeout(() => map.invalidateSize(), 250);
        });
    </script>
</body>
</html>
